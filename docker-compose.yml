# ============================================================
# RAG Knowledge Base - Production Docker Compose
# 
# Usage:
#   Basic (Ollama):       docker-compose up -f docker-compose.yml --profile ollama
#   Premium (OpenAI):     docker-compose up -f docker-compose.yml --profile openai
#   With Gradio UI:       docker-compose up -f docker-compose.yml -f docker-compose.gradio.yml
#   Development:         docker-compose up -f docker-compose.yml -f docker-compose.dev.yml
# ============================================================

services:
  # ---- API Server (both profiles) ----
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: rag-api
    profiles: [ollama, openai]  # only starts with --profile
    ports:
      - "8000:8000"
    environment:
      # LLM Provider - set to "ollama" for basic, "openai" for premium
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      # OpenAI settings (premium)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-3.5-turbo}
      # Ollama settings (basic)
      OLLAMA_API_BASE: ${OLLAMA_API_BASE:-http://host.docker.internal:11434/v1}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
      # Embedding
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      # Chroma
      CHROMA_PERSIST_DIR: /app/chroma_db
      # Server
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
      SERVER_RELOAD: "false"
      # Retriever
      SEARCH_TYPE: ${SEARCH_TYPE:-hybrid}
      DEFAULT_TOP_K: ${DEFAULT_TOP_K:-5}
    volumes:
      - chroma_data:/app/chroma_db
      - ./data:/app/data:ro
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ---- Ollama Service (Basic mode) ----
  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    profiles: [ollama]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # Ollama with large models needs significant GPU/CPU
          memory: 8G
        reservations:
          memory: 2G

  # ---- Gradio Web UI ----
  ui:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: rag-ui
    profiles: [ui]
    ports:
      - "7860:7860"
    environment:
      API_BASE_URL: http://api:8000
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      GRADIO_SERVER_NAME: "0.0.0.0"
      GRADIO_SERVER_PORT: "7860"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

# ---- Named Volumes ----
volumes:
  chroma_data:
    driver: local
  ollama_data:
    driver: local

# ---- Network ----
networks:
  default:
    name: rag-network
    driver: bridge
